name: Renew iOS Certificate

on:
  workflow_dispatch:

jobs:
  renew-ios-cert:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install fastlane
        run: sudo gem install fastlane -NV

      - name: Create Fastfile
        run: |
          mkdir -p fastlane

          cat > fastlane/Fastfile <<'RUBY'
          require "base64"

          default_platform(:ios)

          platform :ios do
            lane :renew_cert do
              api_key = app_store_connect_api_key(
                key_id: ENV["FASTLANE_KEY_ID"],
                issuer_id: ENV["FASTLANE_ISSUER_ID"],
                key_content: ENV["FASTLANE_KEY"],
                is_key_content_base64: false
              )

              auth = Base64.strict_encode64("#{ENV["GITHUB_REPOSITORY_OWNER"]}:#{ENV["GH_PAT"]}")

              match_nuke(
                type: "appstore",
                api_key: api_key,
                git_basic_authorization: auth,
                skip_confirmation: true
              )

              match(
                type: "appstore",
                api_key: api_key,
                git_basic_authorization: auth,
                readonly: false,
                force: true
              )
            end
          end
          RUBY

      - name: Run renew
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}

        run: fastlane ios renew_cert
